<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/style-main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=VT323&display=swap"
    />
    <title>Wiki Run</title>
  </head>
  <body>
    <div class="overlay noise"></div>
    <div class="border-grey">
      <div class="border-fucsia">
        <header>
          <section class="title">
            <h2>WIKI RUN</h2>
            <h3 class="wikirun-protocol">
              WIKI RUN PROTOCOL ACTIVE - <span class="blue-words">Beat it</span>
            </h3>
          </section>
        </header>
        <main>
          <div id="display-result"></div>
        </main>
      </div>
    </div>
    <footer>
      <div class="border">
        <div class="jump">
          <p id="n-jumps">
            <span id="jump-text">NUMBER OF JUMP</span>
            <span id="jumps">0</span>
          </p>
        </div>
        <div class="logo">
          <img src="./assets/img/logo.png" alt="Logo" />
        </div>
        <div class="timer">
          <p id="pulsing-text">
            <span id="minutes">00</span>:<span id="seconds">00</span>
          </p>
        </div>
      </div>
    </footer>
    <script src="./assets/js/script.js"></script>
  </body>
</html>
